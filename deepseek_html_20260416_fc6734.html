<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONO AI ULTRA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Анимированный градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Header */
        .header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a8b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text p {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
        
        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .plan-indicator {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #a8b4ff;
            letter-spacing: 0.5px;
        }
        
        .plan-indicator.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }
        
        .menu-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        
        /* Навигационные вкладки */
        .nav-tabs {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 5;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-tab {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
        }
        
        .nav-tab .icon {
            font-size: 20px;
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(102, 126, 234, 0.3);
        }
        
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            border-radius: 2px;
        }
        
        /* Основной контент */
        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }
        
        .page {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 16px;
        }
        
        .page.active {
            display: block;
        }
        
        /* Страница чата */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .message-content {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .message-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            text-align: right;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px 20px 0 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(15, 15, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(15, 15, 26, 0.95);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .chat-input::placeholder {
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            transform: scale(1.05);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Страница профиля */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            padding: 20px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .profile-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .profile-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .profile-info p {
            color: #888;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #a8b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 13px;
            color: #888;
        }
        
        .info-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #888;
            font-size: 14px;
        }
        
        .info-value {
            font-weight: 600;
            color: #fff;
        }
        
        /* Страница подписки */
        .plans-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .plan-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .plan-card.active {
            border-color: #667eea;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
        }
        
        .plan-card.active::before {
            content: '✓ АКТИВЕН';
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .plan-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .plan-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .plan-price {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #a8b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .plan-features {
            list-style: none;
            margin-bottom: 24px;
        }
        
        .plan-features li {
            padding: 8px 0;
            color: #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .plan-features li::before {
            content: "✨";
            color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .key-input-container {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }
        
        .key-input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 15, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        /* Индикатор печати */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        /* Загрузка */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(102, 126, 234, 0.3);
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal-title {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Изображения в чате */
        .chat-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        /* Адаптивность */
        @media (max-width: 480px) {
            .header {
                padding: 12px 16px;
            }
            
            .logo-text h1 {
                font-size: 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.8);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <div class="logo-text">
                <h1>MONO AI ULTRA</h1>
                <p>Искусственный интеллект</p>
            </div>
        </div>
        <div class="user-badge">
            <div class="plan-indicator" id="planIndicator">Загрузка...</div>
            <div class="menu-btn" onclick="showMenu()">⋮</div>
        </div>
    </div>
    
    <!-- Навигация -->
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('chat')">
            <span class="icon">💬</span>
            <span>Чат</span>
        </button>
        <button class="nav-tab" onclick="switchTab('profile')">
            <span class="icon">👤</span>
            <span>Профиль</span>
        </button>
        <button class="nav-tab" onclick="switchTab('subscription')">
            <span class="icon">💎</span>
            <span>Подписка</span>
        </button>
    </div>
    
    <!-- Контент -->
    <div class="content">
        <!-- Чат -->
        <div id="chatPage" class="page active">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="message-avatar">🤖</div>
                        <div class="message-content">
                            👋 Привет! Я MONO AI — мощный искусственный интеллект.<br><br>
                            ✨ Я могу отвечать на вопросы, писать код, переводить тексты и многое другое!<br><br>
                            💬 Просто напишите мне что-нибудь!
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="messageInput" placeholder="Напишите сообщение..." />
                    <div class="action-buttons">
                        <button class="action-btn" onclick="showImageModal()" title="Сгенерировать изображение">🎨</button>
                        <button class="action-btn primary" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Профиль -->
        <div id="profilePage" class="page">
            <div id="profileContent">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
        
        <!-- Подписка -->
        <div id="subscriptionPage" class="page">
            <div id="subscriptionContent">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для генерации изображений -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-title">🎨 Генерация изображения</div>
            <input type="text" class="key-input" id="imagePrompt" placeholder="Опишите изображение..." />
            <button class="btn btn-primary" onclick="generateImage()">Сгенерировать</button>
            <button class="btn btn-secondary" onclick="closeModal('imageModal')">Отмена</button>
        </div>
    </div>
    
    <!-- Модальное окно для активации ключа -->
    <div class="modal" id="keyModal">
        <div class="modal-content">
            <div class="modal-title">🔑 Активация ключа</div>
            <input type="text" class="key-input" id="activationKey" placeholder="Введите ключ..." />
            <button class="btn btn-primary" onclick="activateKey()">Активировать</button>
            <button class="btn btn-secondary" onclick="closeModal('keyModal')">Отмена</button>
        </div>
    </div>
    
    <!-- Модальное окно меню -->
    <div class="modal" id="menuModal">
        <div class="modal-content">
            <div class="modal-title">Меню</div>
            <button class="btn btn-primary" onclick="window.location.reload()">🔄 Обновить</button>
            <button class="btn btn-secondary" onclick="closeModal('menuModal')">Закрыть</button>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // API URL (замените на URL вашего бэкенда)
        const API_URL = 'https://your-backend-url.com/api';
        
        // Данные пользователя
        let userData = null;
        let userId = tg.initDataUnsafe?.user?.id || 'test_user';
        let userName = tg.initDataUnsafe?.user?.first_name || 'Гость';
        
        // Загрузка данных при старте
        async function loadUserData() {
            try {
                const response = await fetch(`${API_URL}/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        first_name: userName
                    })
                });
                
                userData = await response.json();
                updateUI();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                // Демо-данные для теста
                userData = {
                    user_id: userId,
                    first_name: userName,
                    plan: null,
                    expires: null,
                    daily_msgs: 0,
                    tokens_used: 0,
                    joined: new Date().toISOString()
                };
                updateUI();
            }
        }
        
        // Обновление интерфейса
        function updateUI() {
            updatePlanIndicator();
            loadProfile();
            loadSubscription();
        }
        
        // Обновление индикатора плана
        function updatePlanIndicator() {
            const indicator = document.getElementById('planIndicator');
            
            if (userData.plan === 'mono_plus') {
                indicator.textContent = '🔵 MONO PLUS';
                indicator.classList.add('active');
            } else if (userData.plan === 'mono') {
                indicator.textContent = '🟢 MONO';
                indicator.classList.add('active');
            } else {
                indicator.textContent = '⚠️ Нет подписки';
                indicator.classList.remove('active');
            }
        }
        
        // Переключение вкладок
        function switchTab(tab) {
            // Обновление кнопок
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-tab').classList.add('active');
            
            // Обновление страниц
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(tab + 'Page').classList.add('active');
            
            // Загрузка данных при необходимости
            if (tab === 'profile') loadProfile();
            if (tab === 'subscription') loadSubscription();
        }
        
        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!userData || !userData.plan) {
                alert('⚠️ Активируйте подписку в разделе "Подписка"');
                return;
            }
            
            const messagesDiv = document.getElementById('chatMessages');
            
            // Добавление сообщения пользователя
            messagesDiv.innerHTML += createUserMessage(message);
            input.value = '';
            
            // Индикатор печати
            messagesDiv.innerHTML += createTypingIndicator();
            scrollToBottom();
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }
                
                messagesDiv.innerHTML += createBotMessage(data.response);
                userData = data.user_data;
                updatePlanIndicator();
                scrollToBottom();
                
            } catch (error) {
                removeTypingIndicator();
                alert('Ошибка соединения');
            }
        }
        
        // Генерация изображения
        async function generateImage() {
            const prompt = document.getElementById('imagePrompt').value.trim();
            
            if (!prompt) {
                alert('Введите описание изображения');
                return;
            }
            
            if (!userData || userData.plan !== 'mono_plus') {
                alert('🎨 Генерация изображений доступна только для MONO PLUS');
                return;
            }
            
            closeModal('imageModal');
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += createUserMessage(`🎨 ${prompt}`);
            messagesDiv.innerHTML += createTypingIndicator();
            scrollToBottom();
            
            try {
                const response = await fetch(`${API_URL}/image`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        prompt: prompt
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }
                
                messagesDiv.innerHTML += createImageMessage(data.image);
                scrollToBottom();
                
            } catch (error) {
                removeTypingIndicator();
                alert('Ошибка генерации');
            }
            
            document.getElementById('imagePrompt').value = '';
        }
        
        // Активация бесплатного плана
        async function activateFree() {
            try {
                const response = await fetch(`${API_URL}/activate_free`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                
                const data = await response.json();
                alert(data.message);
                
                if (data.success) {
                    await loadUserData();
                    switchTab('chat');
                }
            } catch (error) {
                alert('Ошибка активации');
            }
        }
        
        // Активация ключа
        async function activateKey() {
            const key = document.getElementById('activationKey').value.trim();
            
            if (!key) {
                alert('Введите ключ');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/activate_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        key: key
                    })
                });
                
                const data = await response.json();
                alert(data.message);
                
                if (data.success) {
                    closeModal('keyModal');
                    await loadUserData();
                    document.getElementById('activationKey').value = '';
                }
            } catch (error) {
                alert('Ошибка активации');
            }
        }
        
        // Загрузка профиля
        function loadProfile() {
            if (!userData) return;
            
            const expDate = userData.expires 
                ? new Date(userData.expires).toLocaleDateString('ru-RU')
                : 'Нет';
            
            const remaining = userData.plan === 'mono'
                ? 30 - (userData.daily_msgs || 0)
                : userData.plan === 'mono_plus'
                    ? (128000 - (userData.tokens_used || 0)).toLocaleString()
                    : '0';
            
            const html = `
                <div class="profile-header">
                    <div class="profile-avatar-large">👤</div>
                    <div class="profile-info">
                        <h2>${userData.first_name}</h2>
                        <p>ID: ${userData.user_id}</p>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${userData.plan ? '✓' : '✗'}</div>
                        <div class="stat-label">Статус подписки</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${remaining}</div>
                        <div class="stat-label">${userData.plan === 'mono' ? 'Сообщений' : 'Токенов'}</div>
                    </div>
                </div>
                
                <div class="info-card">
                    <div class="info-row">
                        <span class="info-label">📅 Регистрация</span>
                        <span class="info-value">${new Date(userData.joined).toLocaleDateString('ru-RU')}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">💎 Тариф</span>
                        <span class="info-value">
                            ${userData.plan === 'mono' ? '🟢 MONO' : 
                              userData.plan === 'mono_plus' ? '🔵 MONO PLUS' : 
                              '⚠️ Нет подписки'}
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">📅 Действует до</span>
                        <span class="info-value">${expDate}</span>
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = html;
        }
        
        // Загрузка страницы подписок
        function loadSubscription() {
            if (!userData) return;
            
            const isActive = userData.plan && userData.expires && new Date(userData.expires) > new Date();
            const isPlus = userData.plan === 'mono_plus';
            
            const html = `
                <div class="plans-container">
                    ${!isActive ? `
                        <div class="plan-card">
                            <div class="plan-name">
                                <span>🟢</span> MONO
                            </div>
                            <div class="plan-price">Бесплатно</div>
                            <ul class="plan-features">
                                <li>30 сообщений в день</li>
                                <li>Модель MONO-15B</li>
                                <li>29+ языков</li>
                                <li>Безлимитные диалоги</li>
                            </ul>
                            <button class="btn btn-primary" onclick="activateFree()">
                                🎁 Активировать бесплатно
                            </button>
                        </div>
                    ` : ''}
                    
                    <div class="plan-card ${isPlus ? 'active' : ''}">
                        ${isPlus ? '<div class="plan-badge">✓ АКТИВЕН</div>' : ''}
                        <div class="plan-name">
                            <span>🔵</span> MONO PLUS
                        </div>
                        <div class="plan-price">от 200 ₽</div>
                        <ul class="plan-features">
                            <li>128 000 токенов</li>
                            <li>🎨 Генерация изображений</li>
                            <li>⚡ Приоритетная обработка</li>
                            <li>🚀 Максимальная скорость</li>
                        </ul>
                        
                        <div class="key-input-container">
                            <button class="btn btn-primary" onclick="showBuyInfo()">
                                🛒 Купить подписку
                            </button>
                            <button class="btn btn-secondary" onclick="showKeyModal()">
                                🔑 Активировать ключ
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('subscriptionContent').innerHTML = html;
        }
        
        // Вспомогательные функции для сообщений
        function createUserMessage(text) {
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="message user">
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        ${escapeHtml(text)}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        
        function createBotMessage(text) {
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        ${escapeHtml(text)}
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        
        function createImageMessage(imageBase64) {
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <img src="data:image/png;base64,${imageBase64}" class="chat-image" alt="Generated" />
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
        }
        
        function createTypingIndicator() {
            return `
                <div class="message bot" id="typingIndicator">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Работа с модальными окнами
        function showImageModal() {
            document.getElementById('imageModal').classList.add('active');
        }
        
        function showKeyModal() {
            document.getElementById('keyModal').classList.add('active');
        }
        
        function showMenu() {
            document.getElementById('menuModal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function showBuyInfo() {
            alert('📩 Для покупки подписки напишите: @GGGGG38372\n\n💰 Цены:\n• 1 день — 200 ₽\n• 7 дней — 900 ₽\n• 30 дней — 2 500 ₽\n\n💳 Оплата: Карты РФ, СБП, Криптовалюта');
        }
        
        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработчики событий
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            
            // Отправка по Enter
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            // Закрытие модалок по клику вне
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });
        });
        
        // Экспорт функций для HTML
        window.switchTab = switchTab;
        window.sendMessage = sendMessage;
        window.generateImage = generateImage;
        window.activateFree = activateFree;
        window.activateKey = activateKey;
        window.showImageModal = showImageModal;
        window.showKeyModal = showKeyModal;
        window.showMenu = showMenu;
        window.closeModal = closeModal;
        window.showBuyInfo = showBuyInfo;
    </script>
</body>
</html>
